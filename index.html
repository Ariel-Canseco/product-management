<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD Productos Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🛍️ Gestor de Productos</h1>
    <button onclick="toggleDark()">🌙</button>
</header>

<main>

    <!-- FORMULARIO -->
    <section class="form-section">
        <h2>Agregar / Editar Producto</h2>
        <input type="text" id="nombre" placeholder="Nombre del producto">
        <input type="number" id="precio" placeholder="Precio">
        <button onclick="app.guardar()">Guardar</button>
    </section>

    <!-- FILTROS (NUEVO) -->
    <section class="filtros">
        <input type="text" id="buscar" placeholder="Buscar producto..." oninput="app.filtrar()">
        <input type="number" id="min" placeholder="Precio mínimo" oninput="app.filtrar()">
        <input type="number" id="max" placeholder="Precio máximo" oninput="app.filtrar()">
    </section>

    <!-- LISTA -->
    <section class="lista-section">
        <h2>Lista de Productos</h2>
        <div id="lista"></div>
    </section>

</main>

<!-- NOTIFICACIONES (NUEVO) -->
<div id="toast"></div>

<footer>
    <p>CRUD By: Ricardo Ariel López Canseco 🚀</p>
</footer>

<script src="script.js"></script>
</body>
</html>
